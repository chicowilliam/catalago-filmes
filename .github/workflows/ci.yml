name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      SESSION_SECRET: ci-test-secret
      TMDB_BEARER_TOKEN: ci-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test -- --runInBand

  frontend:
    name: Frontend Lint Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm --prefix catalog-projeto run lint

      - name: Build frontend
        run: npm --prefix catalog-projeto run build

      - name: Test frontend
        run: npm run test:frontend
