<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Filmes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo de filmes">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <form class="login-box" id="loginForm">
    <h2 class="login-title">Acesso</h2>

    <input
      type="text"
      id="username"
      placeholder="Usuário"
      required
    />

    <input
      type="password"
      id="password"
      placeholder="Senha"
      required
    />

    <button type="submit" class="login-btn">
      <span class="login-text">Entrar</span>
      <span class="login-spinner"></span>
    </button>

    <p class="login-error" id="loginError"></p>
  </form>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-container">
    <h1 class="logo">Catalogxz</h1>

    <div class="header-center">
      <nav class="nav">
        <ul class="nav-list filter-group">
          <li><button class="filter-btn active" data-type="all">Todos</button></li>
          <li><button class="filter-btn" data-type="movie">Filmes</button></li>
          <li><button class="filter-btn" data-type="series">Séries</button></li>
          <li><button class="filter-btn" id="favoritesBtn" data-type="favorites"> Minha Lista</button></li>
        </ul>
      </nav>

      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Buscar filme..."
        >
      </div>
    </div>

    <button id="themeToggle" class="theme-toggle" title="Alternar tema" aria-label="Alternar tema claro/escuro">
      <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="main">
  <section class="section">
    <h2 class="section-title">Filmes & Séries</h2>

    <!-- GRID GERADO PELO JS -->
    <div class="movies-grid" id="moviesGrid">
      <!-- JS insere os cards aqui -->
    </div>
  </section>
</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content" id="modalContent">
    <!-- JS injeta conteúdo aqui -->
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <p>Desenvolvido por Vinicius William</p>
</footer>

<!-- SCRIPT -->
<script src="js/script.js" defer></script>

</body>
</html>
