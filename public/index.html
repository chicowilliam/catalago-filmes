<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Filmes</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo de filmes fictício para portfólio">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <form class="login-box" id="loginForm">
    <h2 class="login-title">Admin Access</h2>

    <input
      type="text"
      id="username"
      placeholder="Username"
      required
    />

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    />

    <button type="submit" class="login-btn">
      <span class="login-text">Login</span>
      <span class="login-spinner"></span>
    </button>

    <p class="login-error" id="loginError"></p>
  </form>
</div>

  <!-- LOADER -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-container">

<button id="adminBtn" class="admin-btn">Admin</button>

      <h1 class="logo">Catálogo de Filmes</h1>

      <!-- FILTROS + BUSCA -->
      <div class="header-center">

        <nav class="nav">
          <ul class="nav-list filter-group">
            <li><button class="filter-btn active" data-type="all">Todos</button></li>
            <li><button class="filter-btn" data-type="movie">Filmes</button></li>
            <li><button class="filter-btn" data-type="series">Séries</button></li>
          </ul>
        </nav>

        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Buscar filme..."
          >
        </div>

      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <section class="section">
      <h2 class="section-title">Filmes & Séries</h2>

      <!-- CARROSSEL -->
      <div class="carousel">

        <button class="carousel-btn left">‹</button>

        <!-- GRID GERADO PELO JS -->
        <div class="movies-row" id="moviesGrid">
          <!-- JS insere os cards aqui -->
        </div>

        <button class="carousel-btn right">›</button>

      </div>
    </section>

  </main>

  <!-- MODAL (ESTRUTURA CORRETA PRO JS) -->
  <div id="modal" class="modal">
    <div class="modal-content" id="modalContent">
      <!-- JS injeta imagem / vídeo / sinopse aqui -->
    </div>
  </div>
<img src="assets/images/batman.jpg" style="width:200px">
  <!-- FOOTER -->
  <footer class="footer">
    <p class="footer-text">Projeto desenvolvido para portfólio</p>
  </footer>

  <!-- SCRIPT -->
  <script src="js/script.js" defer></script>

<div id="adminModal" class="modal">
  <div class="modal-content">
    <h2>Admin Panel</h2>

    <form id="adminForm">
      <input placeholder="Título" id="title" required />
      <input placeholder="Imagem URL" id="image" required />
      <input placeholder="Trailer ID" id="trailerId" />
      <select id="type">
        <option value="movie">Filme</option>
        <option value="series">Série</option>
      </select>
      <textarea placeholder="Sinopse" id="synopsis"></textarea>

      <button type="submit">Salvar</button>
    </form>
  </div>
</div>

</body>
</html>
